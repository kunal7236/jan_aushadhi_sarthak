name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v2
        with:
          flutter-version: '3.10.5'

      - name: Write release keystore from secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          umask 077

          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing one or more Android signing secrets. Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD." >&2
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Bump version
        id: bump
        run: |
          set -e
          version_line=$(grep '^version:' pubspec.yaml || true)
          ver=$(echo "$version_line" | sed 's/version: //')
          name=${ver%%+*}
          build=${ver##*+}
          newbuild=$((build+1))
          newver="${name}+${newbuild}"
          sed -i "s/^version: .*/version: ${newver}/" pubspec.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${newver} [skip ci]" || echo "no changes to commit"
          git push
          echo "newver=${newver}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --split-per-abi --release

      - name: Build universal APK
        run: flutter build apk --release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.newver }}
          name: Release ${{ steps.bump.outputs.newver }}
          body: Automated APK release
          allowUpdates: true
          replaceArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: >-
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk,
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk,
            build/app/outputs/flutter-apk/app-x86_64-release.apk,
            build/app/outputs/flutter-apk/app-release.apk

      - name: Cleanup signing files
        if: always()
        run: |
          rm -f android/key.properties
          rm -f android/app/upload-keystore.jks
